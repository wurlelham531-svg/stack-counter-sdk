name: CI

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - name: Install published package (smoke check)
        continue-on-error: true
        run: npm install stack-counter-sdk --no-save
      - run: npm run typecheck
      - run: npm run lint
        continue-on-error: true
      - run: npm run test:utils
      - run: npm run test:contract
      - run: npm run test:constants
      - run: npm run build
